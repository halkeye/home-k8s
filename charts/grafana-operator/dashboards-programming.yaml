---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: programming
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  title: "Programming"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: golang
spec:
  datasources:
  - inputName: "DS_PROMETHEUS"
    datasourceName: "prometheus"
  folderRef: programming
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  url: https://grafana.com/api/dashboards/21221/revisions/1/download
---
apiVersion: grafana.integreatly.org/v1beta1
