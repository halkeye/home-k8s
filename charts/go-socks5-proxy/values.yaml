controllers:
  proxy:
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: ghcr.io/ryanbekhen/nanoproxy
          tag: 0.17.3
        env:
          ADDR: ":1080"
          ADDR_HTTP: ":8080"
          NO_AUTH_MODE: "true"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
            add: ["NET_ADMIN"]
        resources:
          requests:
            cpu: 10m
            memory: 512Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
service:
  socks5:
    forceRename: go-socks5-proxy
    controller: proxy
    type: LoadBalancer
    loadBalancerClass: tailscale
    ports:
      socks5:
        port: 1080
        protocol: TCP
      http:
        port: 8080
        protocol: TCP
  exposed:
    controller: proxy
    type: LoadBalancer
    ports:
      socks5:
        port: 1080
        protocol: TCP
      http:
        port: 8080
        protocol: TCP
