apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stirling-pdf
spec:
  parentRefs:
    - name: http-gateway
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - pdf.g4v.dev
  rules:
    - backendRefs:
        - name: stirling-pdf
          port: 8080
          kind: Service
      matches:
        - path:
            type: PathPrefix
            value: /

