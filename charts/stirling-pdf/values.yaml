# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

controllers:
  main:
    replicas: 1
    containers:
      main:
        image:
          repository: ghcr.io/stirling-tools/stirling-pdf
          tag: 2.5.3-fat
        # command:
        #   - java
        #   - -Dfile.encoding=UTF-8
        #   - -jar
        #   - /app.jar
        env:
          SECURITY_ENABLELOGIN: 'false'
          SYSTEM_SHOWUPDATE: "false"
          SYSTEM_ENABLEANALYTICS: "false"
          DOCKER_ENABLE_SECURITY: 'false'
          STIRLING_PDF_DESKTOP_UI: 'false'
          STIRLING_TEMPFILES_DIRECTORY: /tmp/stirling-pdf
          TMPDIR: /tmp/stirling-pdf
          TEMP: /tmp/stirling-pdf
          TMP: /tmp/stirling-pdf
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/info/status
                port: 8080
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/info/status
                port: 8080
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/info/status
                port: 8080
        securityContext:
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 1Gi
    pod:
      securityContext:
        runAsUser: 102
        runAsGroup: 103
        runAsNonRoot: true
        fsGroup: 103
        fsGroupChangePolicy: OnRootMismatch
service:
  main:
    controller: main
    ports:
      http:
        port: 8080
route:
  main:
    enabled: true
    parentRefs:
      - name: http-gateway
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - "pdf.g4v.dev"
    rules:
      - matches:
        - path:
            type: PathPrefix
            value: /
        backendRefs:
          - identifier: main
            port: http
persistence:
  temporary:
    type: emptyDir
    medium: Memory
    globalMounts:
      - path: /configs
        subPath: configs
      - path: /customFiles
        subPath: customFiles
      - path: /logs
        subPath: logs
      - path: /pipeline
        subPath: pipeline
      - path: /tmp
        subPath: tmp
      - path: /usr/share/tessdata
        subPath: tessdata
      - path: /home/stirlingpdfuser
        subPath: stirlingpdfuser
