# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
controllers:
  main:
    type: daemonset
    pod:
      hostNetwork: true
    containers:
      lms:
        image:
          repository: flungo/avahi
          tag: latest@sha256:a34f291af62df2432aed31e4cfa07e27bccd05efd0425328b79b0ab2bfc8e136
        env:
          REFLECTOR_ENABLE_REFLECTOR: yes
        securityContext:
          privileged: true
        resources:
          requests:
            memory: 250Mi
            cpu: 15m
