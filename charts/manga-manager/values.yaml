---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
controllers:
  app:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: thepromidius/manga-manager
          tag: latest@sha256:90baf5f2eec29f341daf692fd57ceea39551366f30c59c85b7352a94f41dd600
        env:
          TZ: America/Vancouver
          PUID: 1026
          PGID: 100
service:
  main:
    controller: app
    ports:
      http:
        port: 3000

route:
  main:
    enabled: true
    parentRefs:
      - name: http-gateway
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - "manga-manager.g4v.dev"
    rules:
      - matches:
        - path:
            type: PathPrefix
            value: /
        backendRefs:
          - group: ''
            kind: Service
            identifier: main
            port: http
            weight: 1

persistence:
  tmp:
    type: emptyDir
    sizeLimit: 5G
    globalMounts:
      - path: /covers
        subPath: covers
      - path: /tmp
        subPath: tmp
  comics:
    type: nfs
    server: 172.16.10.10
    path: /volume1/Comics
    globalMounts:
      - path: /comics
