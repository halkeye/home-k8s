---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/instance: authentik
  name: authentik-server-import-certs
spec:
  concurrencyPolicy: Forbid
  schedule: '@daily'
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata: {}
    spec:
      template:
        metadata: {}
        spec:
          containers:
          - args:
            - import_certificate
            - --certificate
            - /certs/tls.crt
            - --private-key
            - /certs/tls.key
            - --name
            - tls
            env:
            - name: AUTHENTIK_LISTEN__HTTP
              value: 0.0.0.0:9000
            - name: AUTHENTIK_LISTEN__HTTPS
              value: 0.0.0.0:9443
            - name: AUTHENTIK_LISTEN__METRICS
              value: 0.0.0.0:9300
            envFrom:
            - secretRef:
                name: authentik
            image: ghcr.io/goauthentik/server:2026.5.2
            imagePullPolicy: IfNotPresent
            name: authentik
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /certs
              name: certs
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          volumes:
          - name: certs
            secret:
              defaultMode: 420
              secretName: authentik-tls
