controllers:
  gathio:
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: 'true'
    containers:
      gathio:
        image:
          repository: ghcr.io/lowercasename/gathio
          tag: 1.6.2
        command:
          - npm
          - run
          - start
        envFrom:
          - secretRef:
              name: "gathio"
        probes:
          liveness: &probes
            enabled: false
          readiness: *probes
          startup: *probes
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            memory: 256Mi
            cpu: 10m
          limits:
            memory: 256Mi
    pod:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
service:
  main:
    controller: gathio
    ports:
      http:
        port: 3000
route:
  main:
    enabled: true
    parentRefs:
      - name: http-gateway
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - "events.g4v.dev"
    rules:
      - matches:
        - path:
            type: PathPrefix
            value: /
        backendRefs:
          - identifier: main
            port: http
persistence:
  configmap:
    enabled: true
    type: secret
    name: "gathio"
    globalMounts:
      - path: /app/config/config.toml
        readOnly: true
        subPath: config.toml
  files:
    enabled: true
    suffix: files
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    globalMounts:
      - subPath: "events"
        path: "/app/public/events"
  tmp:
    type: emptyDir
