apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: excalidraw-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: excalidraw
  oidc:
    provider:
      issuer: "https://auth.g4v.dev/application/o/excalidraw/"
    clientID: "zFSJveB3M3PIPQQ4lRIWUxI83w5AHS7TrS6m7ttr"
    clientSecret:
      name: "excalidraw-client-secret"
    redirectURL: "https://draw.g4v.dev/oauth2/callback"
    logoutPath: "/myapp/logout"
