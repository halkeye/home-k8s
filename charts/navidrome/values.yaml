---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
defaultPodOptions:
  enableServiceLinks: false
  securityContext:
    runAsUser: 1026
    runAsGroup: 100
    runAsNonRoot: true
    fsGroup: 100
    fsGroupChangePolicy: "OnRootMismatch"

controllers:
  navidrome:
    annotations:
      reloader.stakater.com/auto: "true"
      litestream: enabled
    containers:
      oauth2proxy:
        image: 
          repository: quay.io/oauth2-proxy/oauth2-proxy
          tag: v7.14.3
        env:
          OAUTH2_PROXY_ALPHA_CONFIG: /data/oauth2_proxy.cfg
        envFrom:
          - secretRef:
              name: navidrome-oauth2-proxy
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        resources:
          limits:
            memory: 110Mi
          requests:
            cpu: 30m
            memory: 110Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
      navidrome:
        image:
          repository: ghcr.io/navidrome/navidrome
          tag: 0.60.3
        env:
          TZ: America/Vancouver
          ND_AUTHREQUESTLIMIT: 0
          ND_COVERJPEGQUALITY: "100"
          ND_DATAFOLDER: /config
          ND_DEFAULTTHEME: Dark
          ND_ENABLEGRAVATAR: "true"
          ND_ENABLESHARING: "true"
          ND_ENABLETRANSCODINGCONFIG: "true"
          ND_EXTAUTH_TRUSTEDSOURCES: "0.0.0.0/0"
          ND_EXTAUTH_USERHEADER: X-Auth-Request-User
          ND_IMAGECACHESIZE: "1GB"
          ND_LASTFM_ENABLED: "true"
          ND_PORT: 8080
          ND_PROMETHEUS_ENABLED: "true"
          ND_SCANSCHEDULE: "@every 1h"
          ND_SEARCHFULLSTRING: "true"
          ND_SESSIONTIMEOUT: 24h
          ND_SUBSONICARTISTPARTICIPATIONS: "true"
        envFrom:
          - secretRef:
              name: navidrome-secret
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        resources:
          requests:
            cpu: 10m
            memory: 250Mi
          limits:
            memory: 1Gi

service:
  main:
    controller: navidrome
    ports:
      http:
        port: 8080
      oauth:
        port: 4180

route:
  main:
    enabled: true
    parentRefs:
      - name: http-gateway
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - "navidrome.g4v.dev"
    rules:
      - matches:
        - path:
            type: PathPrefix
            value: /
        backendRefs:
          - identifier: main
            port: oauth
      - matches:
        - path:
            type: PathPrefix
            value: /share/
        backendRefs:
          - identifier: main
            port: http
      - matches:
        - path:
            type: PathPrefix
            value: /rest/
        backendRefs:
          - identifier: main
            port: http

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    globalMounts:
      - path: /config
  music:
    type: nfs
    server: 172.16.10.10
    path: /volume1/Audio/Music
    globalMounts:
      - path: /music
  configmap:
    type: configMap
    name: navidrome-configmap
    globalMounts:
      - path: /data/navidrome.toml
        subPath: navidrome.toml
        readOnly: true
      - path: /data/oauth2_proxy.cfg
        subPath: oauth2_proxy.cfg
        readOnly: true
  litestream-configmap:
    type: configMap
    name: litestream-configmap
    globalMounts: []
