# https://www.navidrome.org/docs/usage/configuration-options/#available-options
AuthRequestLimit = 0
CoverArtQuality = 100
DefaultTheme = "Dark"
EnableGravatar = false
EnableSharing = true
EnableTranscodingConfig = true
# EnableUserEditing = true # needed to set external password
ImageCacheSize = "1GB"
LogLevel = 'DEBUG'
MusicFolder = '/music'
SessionTimeout = 99d
TranscodingCacheSize = '5GB'

[Search]
FullString = true

[ExtAuth]
TrustedSources = "10.0.0.0/8"
UserHeader = "X-Authentik-Username"

[Scanner]
Schedule = '@every 1h'

[LastFM]
Enabled = true
Language = "en"
Languages = [ "en" ]
ScrobbleFirstArtistOnly = false

[Prometheus]
Enabled = true

[Subsonic]
AppendSubtitle = true
ArtistParticipations = true
DefaultReportRealPath = false
EnableAverageRating = true
LegacyClients = "DSub"
MinimalClients = "SubMusic"
