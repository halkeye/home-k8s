injectRequestHeaders:
    - name: X-Forwarded-User
      preserveRequestValue: false
      values:
        - claimSource:
            claim: preferred_username
injectResponseHeaders:
    - name: X-Auth-Request-User
      preserveRequestValue: false
      values:
        - claimSource:
            claim: preferred_username
metricsServer: {}
providers:
    - clientID: ${OAUTH2_PROXY_CLIENT_ID}
      clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
      oidcConfig:
        issuerURL: https://auth.g4v.dev/application/o/navidrome/
        insecureAllowUnverifiedEmail: true
        insecureSkipIssuerVerification: false
        insecureSkipNonce: true
        skipDiscovery: false
        emailClaim: email
        groupsClaim: groups
        userIDClaim: email
        audienceClaims:
            - aud
      id: authentik
      provider: oidc
      useSystemTrustStore: false
      loginURL: https://auth.g4v.dev
      loginURLParameters:
        - name: approval_prompt
          default:
            - force
      skipClaimsFromProfileURL: false
      scope: openid profile email
      code_challenge_method: S256
      backendLogoutURL: ""
server:
    bindAddress: http://[::]:4180
upstreamConfig:
    proxyRawPath: false
