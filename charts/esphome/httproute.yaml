apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: esphome-tunnel
spec:
  hostnames:
    - esphome.g4v.dev
  parentRefs:
    - name: http-gateway
      namespace: envoy-gateway
      sectionName: https
  rules:
  - backendRefs:
    - name: esphome-tunnel
      port: 6052
    matches:
    - path:
        type: PathPrefix
        value: /
