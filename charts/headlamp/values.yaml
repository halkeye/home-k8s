---
httpRoute:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: http-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - headlamp-h.g4v.dev
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: headlamp
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

image:
  registry: ghcr.io
  repository: headlamp-k8s/headlamp
  tag: "v0.43.0"

config:
  sessionTTL: null
  extraArgs:
    - "-kubeconfig=/configmap/kubeconfig/config"

volumeMounts:
  - name: kubeconfig
    mountPath: /configmap/kubeconfig

volumes:
  - name: kubeconfig
    configMap:
      name: kubeconfig

serviceAccount:
  create: true
  name: "headlamp-admin"

clusterRoleBinding:
  create: true
  clusterRoleName: headlamp-admin
