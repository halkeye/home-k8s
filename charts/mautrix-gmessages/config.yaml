# Network-specific config options
network:
    displayname_template: "{{or .FullName .PhoneNumber}} (GMessage)"

bridge:
    permissions:
      "*": relay
      "g4v.dev": user
      "@halkeye:g4v.dev": admin

# Config for the bridge's database.
database:
    type: postgres
    uri: "$MAUTRIX_DB_URI"

# Homeserver details.
homeserver:
    address: "http://matrix-stack-synapse-main.matrix.svc.cluster.local.:8008"
    domain: g4v.dev
    # Does the homeserver support https://github.com/matrix-org/matrix-spec-proposals/pull/2246?
    async_media: true

# Application service host/registration related details.
# Changing these values requires regeneration of the registration (except when noted otherwise)
appservice:
    address: "http://mautrix-gmessages.matrix.svc.cluster.local.:29319"
    public_address: https://mautrix-bridges.g4v.dev/gmessages
    hostname: 0.0.0.0
    port: 29336
encryption:
    allow: false

env_config_prefix: BRIDGE_

# Logging config. See https://github.com/tulir/zeroconfig for details.
logging:
    min_level: info
    writers:
        - type: stdout
          format: pretty-colored
