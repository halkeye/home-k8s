fullnameOverride: "prometheus"
crds:
  enabled: false
cleanPrometheusOperatorObjectNames: true
prometheusOperation:
  kubeletEndpointsEnabled: false
  kubeletEndpointSliceEnabled: true
# kubeApiServer:
#   serviceMonitor:
#     metricRelabelings:
#       - action: replace
#         sourceLabels:
#           - node
#         targetLabel: instance
alertmanager:
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager-h.g4v.dev
        - alertmanager.h.g4v.dev
      parentRefs:
        - name: http-gateway
          namespace: envoy-gateway
          sectionName: https
  alertmanagerSpec:
    secrets:
      - alertmanager-secrets
  externalUrl: https://alertmanager-h.g4v.dev
  config:
    receivers:
      - name: 'null'
      - name: 'matrix-receiver'
        webhook_configs:
        - url: 'http://matrix-alertmanager:8080/alerts'
          http_config:
            basic_auth:
              username: alertmanager
              password_file: /etc/alertmanager/secrets/alertmanager-secrets/matrix-alertmanager
    route:
      receiver: 'matrix-receiver'
      routes:
        - receiver: "null"
          matchers:
          - alertname="Watchdog"
        - receiver: 'null'
          matchers:
          - severity =~ "none"
        - receiver: 'matrix-receiver'

prometheus:
  enabled: true
  # agentMode: true
  monitor:
    relabelings:
      - action: replace
        regex: (.*)
        replacement: $1
        sourceLabels:
          - __meta_kubernetes_pod_node_name
        targetLabel: kubernetes_node
  prometheusSpec:
    secrets:
      - prometheus-secrets
    # logLevel: debug
    # remoteWrite:
    #   - url: https://prometheus-do.g4v.dev/api/v1/write
    externalLabels:
      cluster: home-k8s
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 50Gi
    ruleSelectorNilUsesHelmValues: false
    serviceDiscoveryRole: EndpointSlice
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    enableFeatures:
      - new-service-discovery-manager
    additionalScrapeConfigs:
      - job_name: nas-syncthing-job
        bearer_token_file: '/etc/prometheus/secrets/prometheus-secrets/nas-syncthings-key'
        scheme: https
        static_configs:
          - targets: ['syncthing.nas.g4v.dev']
      # - job_name: traefik
      #   static_configs:
      #     - targets: ['traefik.nas.g4v.dev:8000']
      # - job_name: nas-node
      #   scheme: https
      #   static_configs:
      #     - targets: ['node-exporter.nas.g4v.dev:443']
      # - job_name: nas-cadvisor
      #   scheme: https
      #   static_configs:
      #     - targets: ['cadvisor.nas.g4v.dev:443']
      #       labels:
      #         cluster: 'nas'
      - job_name: nas-smartctl
        scheme: https
        static_configs:
          - targets: ['smartctl-exporter.nas.g4v.dev:443']
      - job_name: 'homeassistant'
        scrape_interval: 60s
        metrics_path: /api/prometheus
        authorization:
          credentials_file: '/etc/prometheus/secrets/prometheus-secrets/homeassistant-key'
        scheme: http
        static_configs:
          - targets: ['homeassistant.dhcp.home:8123']
  route:
    main:
      enabled: true
      hostnames:
        - prometheus-h.g4v.dev
        - prometheus.h.g4v.dev
      parentRefs:
        - name: http-gateway
          namespace: envoy-gateway
          sectionName: https
grafana:
  enabled: false
defaultRules:
  disabled:
    # my limits are bad anyways, so don't alert me cause i went over
    KubeMemoryOvercommit: true
    KubeMemoryQuotaOvercommit: true
    KubeCPUOvercommit: true
    KubeletDown: true
  rules:
    etcd: false
    kubeApiserver: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
kubeProxy:
  enabled: false
kubeControllerManager:
  service:
    selector:
      k8s-app: kube-controller-manager
prometheus-node-exporter:
  fullnameOverride: node-exporter
  resources:
    requests:
      cpu: 23m
      memory: 64M
    limits:
      memory: 64M
  prometheus:
    monitor:
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - persistentvolumeclaims=[*]
  prometheus:
    monitor:
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
additionalPrometheusRulesMap:
  oom-rules:
    groups:
      - name: oom
        rules:
          - alert: OomKilled
            annotations:
              summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
            expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
            labels:
              severity: critical
# kubernetesServiceMonitors:
#   enabled: false
kubelet:
  enabled: false
  serviceMonitor:
    kubelet: false
    cAdvisor: false
    honorTimestamps: false
    trackTimestampsStaleness: false
    cAdvisorInterval: 30s
