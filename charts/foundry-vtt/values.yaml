controllers:
  main:
    strategy: Recreate
    replicas: 1
    containers:
      foundryvtt:
        image:
          repository: felddy/foundryvtt
          tag: "13.334.0"
        env:
          TZ: America/Vancouver
          TIMEZONE: America/Vancouver
          CONTAINER_CACHE: /data/container_cache
          CONTAINER_PATCHES: /data/container_patches
          CONTAINER_URL_FETCH_RETRY: "50"
          CONTAINER_VERBOSE: "true"
          FOUNDRY_MINIFY_STATIC_FILES: "true"
          FOUNDRY_PROTOCOL: "4"
          FOUNDRY_PROXY_SSL: "true"
          FOUNDRY_COMPRESS_WEBSOCKET: "true"
          FOUNDRY_TELEMETRY: "false"
        envFrom:
          - secretRef:
              name: "foundry-vtt"
        probes:
          liveness: &probes
            enabled: false
          readiness: *probes
          startup:
            enabled: false
        resources:
          requests:
            cpu: 10m
            memory: 1Gi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
service:
  main:
    controller: main
    ports:
      http:
        port: 30000
route:
  main:
    enabled: true
    parentRefs:
      - name: http-gateway
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - "vtt.g4v.dev"
    rules:
      - matches:
        - path:
            type: PathPrefix
            value: /
        backendRefs:
          - identifier: main
            port: http
persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 8Gi
    storageClass: do-block-storage
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
      - path: /data/container_cache
