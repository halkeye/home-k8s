apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: synapse-admin-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: synapse-admin
  oidc:
    provider:
      issuer: "https://auth.g4v.dev/application/o/synapse-admin/"
    clientID: "GZKxL9nPiqjdnID0rhjnAb2vURSuzFkxiPE3J9zp"
    clientSecret:
      name: "synapse-admin-client-secret"
    redirectURL: "https://synapse-admin.g4v.dev/oauth2/callback"
    logoutPath: "/myapp/logout"
