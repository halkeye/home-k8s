serverName: g4v.dev

initSecrets:
  enabled: true

elementAdmin:
  ingress:
    host: element-admin.g4v.dev

elementWeb:
  ingress:
    host: chat.g4v.dev

matrixAuthenticationService:
  annotations:
    reloader.stakater.com/auto: 'true'
  ingress:
    host: matrix-mas.g4v.dev
    # annotations:
    #   external-dns.alpha.kubernetes.io/cloudflare-proxied: 'false'
  encryptionSecret:
    secret: matrix-stack-mas
    secretKey: mas_encryption_secret
  synapseSharedSecret:
    secret: matrix-stack
    secretKey: global_registration_shared_secret
  privateKeys:
    rsa:
      secret: matrix-stack-mas
      secretKey: mas_keys_rsa_private
    ecdsaPrime256v1:
      secret: matrix-stack-mas
      secretKey: mas_keys_additional_private_0
    ecdsaSecp256k1:
      secret: matrix-stack-mas
      secretKey: mas_keys_additional_private_1
    ecdsaSecp384r1:
      secret: matrix-stack-mas
      secretKey: mas_keys_additional_private_2
  # syn2mas:
  #   enabled: true
  #   dryRun: false
  additional:
    1-custom-config:
      configSecret: matrix-stack-mas
      configSecretKey: mas_upstream_oidc.yaml
    2-passwords:
      configSecret: matrix-stack-mas
      configSecretKey: mas_passwords.yaml
  postgres:
    host: private-dok8s-sfo2-do-user-8094590-0.b.db.ondigitalocean.com
    port: 25060
    user: matrix-authentication-service-DrutXJ
    database: matrix-authentication-service
    sslMode: prefer
    password:
      secret: matrix-authentication-service-db-secret-matrix-authentication-service
      secretKey: PASSWORD

matrixRTC:
  sfu:
    exposedServices:
      turn:
        enabled: true
  ingress:
    host: matrix-rtc.g4v.dev

synapse:
  annotations:
    reloader.stakater.com/auto: 'true'
  checkConfigHook:
    enabled: false
  image:
    registry: ghcr.io
    repository: halkeye/docker-synapse
    tag: v1.152.0.4
  ingress:
    host: matrix.g4v.dev
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: '500m'
      nginx.ingress.kubernetes.io/proxy-connect-timeout: '180'
      nginx.ingress.kubernetes.io/proxy-read-timeout: '180'
      nginx.ingress.kubernetes.io/proxy-send-timeout: '180'
    # annotations:
    #   external-dns.alpha.kubernetes.io/cloudflare-proxied: 'false'
  signingKey:
    secret: matrix-stack-synapse2
    secretKey: synapse_signing_key
  macaroon:
    secret: matrix-stack-synapse2
    secretKey: synapse_macaroon_secret_key
  registrationSharedSecret:
    secret: matrix-stack
    secretKey: global_registration_shared_secret
  postgres:
    host: private-dok8s-sfo2-do-user-8094590-0.b.db.ondigitalocean.com
    port: 25060
    user: synapse
    database: synapse
    sslMode: prefer
    password:
      secret: matrix-stack-synapse2
      secretKey: synapse_postgres_password
  additional:
    1-storage:
      configSecret: matrix-stack-synapse2
      configSecretKey: synapse_media_s3.yaml
    # 2-oidc:
    #   configSecret: matrix-stack-synapse2
    #   configSecretKey: synapse_oidc.yaml
  ## additional:
  ##   0-customConfig:
  ##     config: |
  ##       <any valid configuration>
  ##   1-customConfig:
  ##     configSecret: custom-config
  ##     configSecretKey: shared.yaml
  ##
  ## Most settings are configurable but some settings are owned by the chart and can't overwritten

  ## Details of Application Service registration files to give to Synapse
  appservices:
    - secret: matrix-stack-appservice
      secretKey: googlechat-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: googlechat-registration.yaml
    - secret: matrix-stack-appservice
      secretKey: mautrix-gmessages-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: mautrix-gmessages.yaml
    - secret: matrix-stack-appservice
      secretKey: mautrix-instagram-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: mautrix-instagram.yaml
    - secret: matrix-stack-appservice
      secretKey: mautrix-linkedin-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: mautrix-linkedin.yaml
    - secret: matrix-stack-appservice
      secretKey: signal-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: signal-registration.yaml
    - secret: matrix-stack-appservice
      secretKey: telegram-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: telegram-registration.yaml
    - secret: matrix-stack-appservice
      secretKey: whatsapp-doublepuppet.yaml
    - secret: matrix-stack-appservice
      secretKey: whatsapp-registration.yaml

wellKnownDelegation:
  enabled: false

postgres:
  enabled: false

hookshot:
  enabled: true
  annotations:
    reloader.stakater.com/auto: 'true'
  ingress:
    host: element-hookshot.g4v.dev
  appserviceRegistration:
    secret: matrix-stack-hookshot-2
    secretKey: hookshot_registration.yaml
  passkey:
    secret: matrix-stack-hookshot-2
    secretKey: hookshot_passkey
  additional:
    permissions.yaml:
      configSecret: matrix-stack-hookshot-2
      configSecretKey: permissions.yaml
