---
monitoring:
  enabled: true
  createPrometheusRules: true
metrics:
  serviceMonitor:
    enabled: true
defaultSettings:
  backupTarget: s3://halkeye-home-k8s-longhorn@tor1/
  backupTargetCredentialSecret: longhorn-secret
  createDefaultDiskLabeledNodes: true
  restoreVolumeRecurringJobs: true
  guaranteedEngineManagerCPU: 20
  guaranteedReplicaManagerCPU: 20
  orphanAutoDeletion: true
  defaultLonghornStaticStorageClass: longhorn
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  taintToleration: CriticalAddonsOnly:Exists; node-role.kubernetes.io/control-plane:NoSchedule
  allowCollectingLonghornUsageMetrics: true
  concurrentAutomaticEngineUpgradePerNodeLimit: 2
httproute:
  enabled: true
  hostnames:
    - longhorn-h.g4v.dev
  parentRefs:
    - name: http-gateway
      namespace: envoy-gateway
      sectionName: https
longhornDriver:
  tolerations: &tolerations
    - key: CriticalAddonsOnly
      operator: Exists
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
longhornManager:
  tolerations: *tolerations
