---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    supplementalGroups:
      - 992
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"

controllers:
  ollama:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: 'true'
    containers:
      main:
        image:
          repository: docker.io/ollama/ollama
          tag: 0.21.1-rocm
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          TZ: America/Vancouver
          OLLAMA_HOST: 0.0.0.0
#          OLLAMA_ORIGINS: "*"
          OLLAMA_MODELS: "/models"
#          OLLAMA_KEEP_ALIVE: "24h"
#          OLLAMA_LOAD_TIMEOUT: "600"
        lifecycle:
          postStart:
            exec:
              command: [ "/bin/sh", "-c", "ollama pull gemma3; ollama pull deepseek-r1; ollama pull llama3.2; ollama pull mistral; ollama pull qwen3:4b" ]
        resources:
          requests:
            cpu: 500m
            memory: 24Gi
          limits:
            amd.com/gpu: 1
service:
  ollama:
    controller: ollama
    annotations:
      tailscale.com/expose: "true"
    ports:
      http:
        port: 11434
route:
  ollama:
    enabled: true
    parentRefs:
      - name: http-gateway
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - "ollama.g4v.dev"
    rules:
      - matches:
        - path:
            type: PathPrefix
            value: /
        backendRefs:
          - group: ''
            kind: Service
            identifier: ollama
            port: http
            weight: 1
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 20Gi
    advancedMounts:
      ollama:
        main:
          - path: /root/.ollama
          - path: /home/ubuntu/.ollama
          - path: /.ollama
  models:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: nas-apps
    suffix: models
    size: 150Gi
    advancedMounts:
      ollama:
        main:
          - path: /models
  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp
      - path: /root/.postgresql
        subPath: postgresql
